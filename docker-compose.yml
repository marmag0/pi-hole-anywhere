services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      # DNS Ports
      - "53:53/tcp"
      - "53:53/udp"
      # HTTP Ports
      - "80:80/tcp"
      - "443:443/tcp"
    environment:
      TZ: "Europe/Warsaw"
      FTLCONF_webserver_api_password: ${API_PASSWORD}
      FTLCONF_dns_listeningMode: "ALL"
    volumes:
      - "./etc-pihole:/etc/pihole"
    restart: unless-stopped
